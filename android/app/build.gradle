apply plugin: 'com.android.application'

// ─────────────────────────────────────────────────────────────────────────────
// Secrets de signature release — Phase 10A (sécurité).
// AUCUN mot de passe en dur. Résolution : 1) variables d'environnement (CI),
// sinon 2) fichier local non commité `keystore.properties` (gitignored).
// Le build release échoue explicitement si les secrets sont absents (fail-fast
// en bas de fichier). Les secrets ne sont jamais écrits dans les logs.
// ─────────────────────────────────────────────────────────────────────────────
def keystorePropsFile = rootProject.file("keystore.properties")
def keystoreProps = new Properties()
if (keystorePropsFile.exists()) {
    keystorePropsFile.withInputStream { keystoreProps.load(it) }
}
def releaseStorePassword = System.getenv("KEYSTORE_PASSWORD") ?: keystoreProps.getProperty("storePassword")
def releaseKeyPassword   = System.getenv("KEY_PASSWORD")      ?: keystoreProps.getProperty("keyPassword")
def releaseKeyAlias      = System.getenv("KEY_ALIAS")         ?: keystoreProps.getProperty("keyAlias")  ?: "boom-contact"
def releaseStoreFile     = System.getenv("KEYSTORE_FILE")     ?: keystoreProps.getProperty("storeFile") ?: "boom-contact-release.keystore"

android {
    namespace "contact.boom.app"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "contact.boom.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            // Configuré uniquement si les secrets sont disponibles (env ou keystore.properties).
            // Sans secrets : AUCUNE valeur par défaut. Le fail-fast (bas du fichier) bloque
            // tout build release et ne casse ni les builds debug ni les tâches Gradle générales.
            if (releaseStorePassword != null && releaseKeyPassword != null) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

// ─────────────────────────────────────────────────────────────────────────────
// Fail-fast signature release : échec EXPLICITE si KEYSTORE_PASSWORD / KEY_PASSWORD
// (ou keystore.properties) sont absents lors d'un build release. Ne bloque PAS les
// builds debug ni les tâches Gradle générales. N'imprime jamais les mots de passe.
// ─────────────────────────────────────────────────────────────────────────────
tasks.configureEach { task ->
    if (task.name ==~ /(?i)(assemble|bundle).*Release/) {
        task.doFirst {
            if (releaseStorePassword == null || releaseKeyPassword == null) {
                throw new GradleException(
                    "Signature release impossible : definissez KEYSTORE_PASSWORD et KEY_PASSWORD " +
                    "(variables d'environnement CI) ou un fichier keystore.properties non commite " +
                    "(storePassword / keyPassword). Aucun mot de passe par defaut n'est fourni.")
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
