name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Security audit
        run: npm audit --audit-level=moderate
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Build (client + server)
        run: npm run build
      - name: Run tests
        run: npm run test
      - name: ✅ All checks passed
        run: echo "Ready for Railway deploy"
