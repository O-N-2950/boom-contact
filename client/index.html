<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FF3500" />

    <!-- Anti-flash : appliquer le thème AVANT que React charge -->
    <script>
      (function(){
        var t = localStorage.getItem('boom-theme');
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
      })();
    </script>

    <!-- SEO -->
    <title>boom.contact — Constat numérique mondial</title>
    <meta name="description" content="Constat amiable numérique en 5 minutes. OCR 50 langues, QR code, double signature, PDF certifié. Valable dans 150+ pays. Sans installation." />
    <meta name="keywords" content="constat amiable, accident voiture, constat numérique, constat digital, europäischer unfallbericht, accident report, déclaration accident" />
    <meta name="author" content="PEP's Swiss SA — Groupe NEUKOMM" />
    <link rel="canonical" href="https://www.boom.contact" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.boom.contact" />
    <meta property="og:title" content="boom.contact — Constat numérique mondial" />

    <meta property="og:image" content="https://www.boom.contact/logo.png" />
    <meta property="og:locale" content="fr_FR" />
