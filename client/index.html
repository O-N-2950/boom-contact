    <!-- Prefetch main route chunks after idle — reads Vite manifest for hashed filenames -->
    <script>
      if ('requestIdleCallback' in window) {
        requestIdleCallback(function() {
          var chunks = ['ConstatFlow', 'JoinSession'];
          fetch('/.vite/manifest.json')
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(manifest) {
              if (!manifest) return;
              Object.values(manifest).forEach(function(entry) {
                var f = entry.file || '';
                chunks.forEach(function(c) {
                  if (f.indexOf(c) !== -1) {
                    var l = document.createElement('link');
                    l.rel = 'prefetch';
                    l.href = '/' + f;
                    l.as = 'script';
                    document.head.appendChild(l);
                  }
                });
              });
            })
            .catch(function() { /* manifest unavailable in dev — ignore */ });
        });
      }
    </script>
